version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sentiment_user
      POSTGRES_PASSWORD: sentiment_pass
      POSTGRES_DB: sentiment_watchlist
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ../../apps/backend
      dockerfile: ../../infra/docker/Dockerfile.backend
    ports:
      - "3001:3001"
    env_file:
      - ../../.env
    depends_on:
      - postgres
      - redis

  sentiment-engine:
    build:
      context: ../../apps/sentiment-engine
      dockerfile: ../../infra/docker/Dockerfile.sentiment
    ports:
      - "8000:8000"

volumes:
  pgdata:
  redisdata:

